<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${song.title} + ' — Sonic'">Song — Sonic</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
</head>
<body>
<div class="app-shell">

    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <div class="app-content">
        <div th:replace="~{fragments/layout :: topbar}"></div>

        <main class="page-main">

            <section class="hero" style="min-height:300px;">
                <img class="hero-bg"
                     th:src="${song.image != null and !song.image.isEmpty() ? song.image : '/images/default-art.png'}"
                     alt="">
                <div class="hero-overlay"></div>
                <div class="hero-body">
                    <div class="hero-art-wrap">
                        <img class="hero-art"
                             th:src="${song.image != null and !song.image.isEmpty() ? song.image : '/images/default-art.png'}"
                             th:alt="${song.title}"
                             style="width:260px;height:260px;"
                             onerror="this.src='/images/default-art.png'">
                    </div>
                    <div class="hero-info">
                        <p class="hero-label" th:text="${song.album != null and !song.album.isEmpty() ? song.album : 'Single'}">Album</p>
                        <h1 class="hero-title" th:text="${song.title}">Song Title</h1>
                        <p class="hero-artist" th:text="${song.artist}">Artist</p>
                        <button type="button" class="btn-play-hero"
                                th:data-id="${song.id}"
                                th:data-title="${song.title}"
                                th:data-artist="${song.artist}"
                                th:data-album="${song.album}"
                                th:data-image="${song.image}"
                                th:data-url="${song.downloadUrl}"
                                onclick="playSongFromBtn(this)">
                            <i class="ph-fill ph-play"></i> Play Now
                        </button>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <div th:replace="~{fragments/player :: player}"></div>

</div>

<script th:src="@{/js/player.js}"></script>
<script>
    (function(){
        var t = localStorage.getItem('sonic-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
    }());
    document.addEventListener('DOMContentLoaded', function () {
        var btn = document.getElementById('theme-toggle-btn');
        if (btn) btn.addEventListener('click', function () {
            var cur = document.documentElement.getAttribute('data-theme');
            var next = cur === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('sonic-theme', next);
            var icon = document.getElementById('theme-icon');
            if (icon) icon.className = next === 'dark' ? 'ph-fill ph-moon' : 'ph-fill ph-sun';
        });
    });
</script>
</body>
</html>
