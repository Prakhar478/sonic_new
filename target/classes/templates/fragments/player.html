<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

    <div th:fragment="player" id="sonic-player-bar" class="player-bar">
        <!-- Left: track info -->
        <div class="player-section player-track">
            <img id="player-art" class="player-art" src="/images/default-art.png" alt="Album Art"
                onerror="this.src='/images/default-art.png'">
            <div class="player-meta">
                <div id="player-title" class="player-title">Nothing playing</div>
                <div id="player-artist" class="player-artist">—</div>
            </div>
        </div>

        <!-- Centre: controls + seek -->
        <div class="player-section player-centre">
            <div class="player-controls">
                <button type="button" id="btn-shuffle" class="ctrl-btn" title="Shuffle: OFF">
                    <i class="ph ph-shuffle"></i>
                </button>
                <button type="button" id="btn-prev" class="ctrl-btn" title="Previous">
                    <i class="ph-fill ph-skip-back"></i>
                </button>
                <button type="button" id="btn-play-pause" class="ctrl-btn ctrl-play" title="Play / Pause">
                    <i id="player-play-icon" class="ph-fill ph-play"></i>
                </button>
                <button type="button" id="btn-next" class="ctrl-btn" title="Next">
                    <i class="ph-fill ph-skip-forward"></i>
                </button>
            </div>

            <div class="player-seek-row">
                <span id="player-current-time" class="player-time">0:00</span>
                <input type="range" id="player-seek" class="player-seek" value="0" min="0" max="100" step="0.1">
                <span id="player-total-time" class="player-time">0:00</span>
            </div>
        </div>

        <!-- Right: volume + mobile toggle -->
        <div class="player-section player-right">
            <div class="volume-control">
                <i id="player-vol-icon" class="ph-fill ph-speaker-high player-vol-icon"></i>
                <input type="range" id="player-volume" class="player-volume" value="80" min="0" max="100">
            </div>
        </div>
    </div>

</body>

</html>
