<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonic — Discover Music</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
</head>
<body>
<div class="app-shell">

    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <div class="app-content">

        <div th:replace="~{fragments/layout :: topbar}"></div>

        <main class="page-main">

            <!-- Hero: first trending song -->
            <section class="hero" th:if="${trending != null and !trending.isEmpty()}">
                <img class="hero-bg"
                     th:src="${trending[0].image != null and !trending[0].image.isEmpty() ? trending[0].image : '/images/default-art.png'}"
                     alt="">
                <div class="hero-overlay"></div>
                <div class="hero-body">
                    <div class="hero-art-wrap">
                        <img class="hero-art"
                             th:src="${trending[0].image != null and !trending[0].image.isEmpty() ? trending[0].image : '/images/default-art.png'}"
                             alt="Cover">
                    </div>
                    <div class="hero-info">
                        <p class="hero-label">Featured Track</p>
                        <h1 class="hero-title" th:text="${trending[0].title}">Track Title</h1>
                        <p class="hero-artist" th:text="${trending[0].artist}">Artist</p>
                        <div class="hero-actions">
                            <button type="button" class="btn-play-hero"
                                    th:data-id="${trending[0].id}"
                                    th:data-title="${trending[0].title}"
                                    th:data-artist="${trending[0].artist}"
                                    th:data-album="${trending[0].album}"
                                    th:data-image="${trending[0].image}"
                                    th:data-url="${trending[0].downloadUrl}"
                                    onclick="playSongFromBtn(this)">
                                <i class="ph-fill ph-play"></i> Play Now
                            </button>
                            <button type="button" class="btn-secondary btn-add-playlist"
                                    th:data-id="${trending[0].id}"
                                    th:data-title="${trending[0].title}"
                                    th:data-artist="${trending[0].artist}"
                                    th:data-album="${trending[0].album}"
                                    th:data-image="${trending[0].image}"
                                    th:data-url="${trending[0].downloadUrl}">
                                <i class="ph ph-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Discover grid -->
            <section class="discover-section">
                <h2 class="section-heading">Discover</h2>
                <div class="cards-grid" th:if="${trending != null and !trending.isEmpty()}" id="home-cards">
                    <div th:each="song, stat : ${trending}"
                         class="song-card"
                         th:data-id="${song.id}"
                         th:data-title="${song.title}"
                         th:data-artist="${song.artist}"
                         th:data-album="${song.album}"
                         th:data-image="${song.image}"
                         th:data-url="${song.downloadUrl}"
                         onclick="playSongFromBtn(this)">
                        <div class="card-art-wrap">
                            <img class="card-art"
                                 th:src="${song.image != null and !song.image.isEmpty() ? song.image : '/images/default-art.png'}"
                                 alt="Cover"
                                 onerror="this.src='/images/default-art.png'">
                            <div class="card-hover-overlay">
                                <i class="ph-fill ph-play card-play-icon"></i>
                                <button type="button" class="card-add-btn btn-add-playlist"
                                        th:data-id="${song.id}"
                                        th:data-title="${song.title}"
                                        th:data-artist="${song.artist}"
                                        th:data-album="${song.album}"
                                        th:data-image="${song.image}"
                                        th:data-url="${song.downloadUrl}"
                                        onclick="event.stopPropagation();">
                                    <i class="ph ph-plus"></i>
                                </button>
                            </div>
                        </div>
                        <div class="card-info">
                            <div class="card-title"  th:text="${song.title}">Title</div>
                            <div class="card-artist" th:text="${song.artist}">Artist</div>
                        </div>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- Global persistent player -->
    <div th:replace="~{fragments/player :: player}"></div>
    
    <!-- Add to Playlist Modal -->
    <div th:replace="~{fragments/playlist-modal :: playlistModal}"></div>

</div>

<script th:src="@{/js/player.js}"></script>
<script th:src="@{/js/playlist.js}"></script>
<script th:src="@{/js/app.js}"></script>
<script>
    // Build home queue
    document.addEventListener('DOMContentLoaded', function () {
        var cards = Array.from(document.querySelectorAll('#home-cards .song-card'));
        window.__pageQueue = cards.map(function (c) {
            return {
                id:          c.getAttribute('data-id'),
                title:       c.getAttribute('data-title'),
                artist:      c.getAttribute('data-artist'),
                album:       c.getAttribute('data-album'),
                image:       c.getAttribute('data-image'),
                downloadUrl: c.getAttribute('data-url')
            };
        });
    });
</script>
</body>
</html>
