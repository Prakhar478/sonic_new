<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonic — Import Playlist</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
</head>
<body>
<div class="app-shell">

    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <div class="app-content">

        <div th:replace="~{fragments/layout :: topbar}"></div>

        <main class="page-main">

            <div class="page-header">
                <h1 class="page-title pixel-font">Import Playlist</h1>
                <p class="page-subtitle">
                    Paste track titles (one per line) <strong>OR</strong> a YouTube playlist link. 
                    Sonic will match each track with high-quality audio.
                </p>
            </div>

            <!-- Import box -->
            <div class="import-box">
                <textarea
                    id="text-playlist-input"
                    class="import-textarea"
                    rows="9"
                    placeholder="E.g. Paste track titles like:&#10;Arijit Singh - Tum Hi Ho&#10;The Weeknd - Blinding Lights&#10;&#10;OR paste a YouTube link:&#10;https://www.youtube.com/playlist?list=..."></textarea>

                <div class="import-actions">
                    <button type="button" id="btn-import" class="btn-primary">
                        <i class="ph-fill ph-list-plus"></i> Import Playlist
                    </button>
                </div>

                <div id="import-status" class="import-status" style="display:none;"></div>
            </div>

            <!-- Results -->
            <div id="imported-playlist-area" style="display:none; margin-top: 2.5rem;">
                <div class="section-toolbar">
                    <h2 class="section-heading">
                        Imported Playlist
                        <span id="imported-count" class="section-count"></span>
                    </h2>
                    <div class="toolbar-btns">
                        <button type="button" id="btn-save-playlist" class="btn-secondary">
                            <i class="ph-fill ph-floppy-disk"></i> Save to Library
                        </button>
                        <button type="button" id="btn-play-all" class="btn-primary">
                            <i class="ph-fill ph-play"></i> Play All
                        </button>
                    </div>
                </div>

                <div class="track-list" id="imported-tracks-list">
                    <!-- rows injected by youtube.js -->
                </div>
            </div>

        </main>
    </div>

    <div th:replace="~{fragments/player :: player}"></div>
    
    <div th:replace="~{fragments/playlist-modal :: playlistModal}"></div>

</div>

<script th:src="@{/js/player.js}"></script>
<script th:src="@{/js/playlist.js}"></script>
<script th:src="@{/js/youtube.js}"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
