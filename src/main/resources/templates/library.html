<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonic — Library</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
</head>
<body>
<div class="app-shell">

    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <div class="app-content">

        <div th:replace="~{fragments/layout :: topbar}"></div>

        <main class="page-main">

            <div class="page-header">
                <h1 class="page-title pixel-font">Library</h1>
                <p class="page-subtitle">Your locally saved playlists and collections.</p>
            </div>

            <!-- Empty state -->
            <div id="library-empty" class="empty-state" style="display:none;">
                <i class="ph-fill ph-books empty-icon"></i>
                <p>Your library is empty.</p>
                <a href="/youtube" class="btn-primary" style="margin-top:1.5rem;">Start Importing</a>
            </div>

            <!-- Playlist cards grid -->
            <div id="playlists-grid" class="cards-grid"></div>

            <!-- Detail panel -->
            <div id="playlist-detail" class="playlist-detail" style="display:none;">
                <div class="detail-header">
                    <div class="detail-info">
                        <h2 class="pixel-font" id="detail-playlist-title">Playlist</h2>
                        <span id="detail-track-count" class="section-count"></span>
                    </div>
                    <div class="detail-actions">
                        <button type="button" id="detail-btn-back" class="btn-ghost">
                            <i class="ph ph-arrow-left"></i> BACK
                        </button>
                        <button type="button" id="detail-btn-delete" class="btn-danger">
                            <i class="ph-fill ph-trash"></i> DELETE
                        </button>
                        <button type="button" id="detail-btn-shuffle" class="btn-secondary">
                            <i class="ph ph-shuffle"></i> SHUFFLE
                        </button>
                        <button type="button" id="detail-btn-play-all" class="btn-primary">
                            <i class="ph-fill ph-play"></i> PLAY ALL
                        </button>
                    </div>
                </div>
                <div class="track-list" id="detail-tracks-list">
                    <!-- rows injected by library.js -->
                </div>
            </div>

        </main>
    </div>

    <div th:replace="~{fragments/player :: player}"></div>
    
    <div th:replace="~{fragments/playlist-modal :: playlistModal}"></div>

</div>

<script th:src="@{/js/player.js}"></script>
<script th:src="@{/js/playlist.js}"></script>
<script th:src="@{/js/library.js}"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
